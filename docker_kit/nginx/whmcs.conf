# Vhost WHMCS (conteneur nginx) — durci
server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    client_max_body_size 32M;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # $host = vrai nom d'hôte transmis par le reverse-proxy (header Host).
        # Sans ça, SERVER_NAME vaut "_" (la valeur littérale de server_name
        # ci-dessus), ce qui casse la validation de licence WHMCS :
        # "Invalid Domain — User provided domain '_'".
        fastcgi_param SERVER_NAME $host;
        fastcgi_pass php:9000;
        fastcgi_read_timeout 300;
    }

    # ---- Durcissement spécifique WHMCS ----
    location ~* ^/(vendor|resources|templates_c|crons)/ { deny all; }
    location ~* (configuration\.php|\.env|composer\.(json|lock)) { deny all; }
    location ~ /\.(?!well-known) { deny all; }

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
