# Vhost WHMCS (conteneur nginx) — durci
server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php;

    client_max_body_size 32M;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # URL propre pour la page légale : /mentions-legales -> mentions-legales.php
    # (la page vit à la racine du webroot, déployée via pages/ par la CI).
    # NB : cette conf nginx n'est PAS synchronisée par la CI. Après cette
    # modif, recopiez-la sur le VPS et rechargez : docker exec whmcs_web nginx -s reload
    location = /mentions-legales { rewrite ^ /mentions-legales.php last; }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # $host = vrai nom d'hôte transmis par le reverse-proxy (header Host).
        # Sans ça, SERVER_NAME vaut "_" (la valeur littérale de server_name
        # ci-dessus), ce qui casse la validation de licence WHMCS :
        # "Invalid Domain — User provided domain '_'".
        fastcgi_param SERVER_NAME $host;
        fastcgi_pass php:9000;
        fastcgi_read_timeout 300;
    }

    # ---- Durcissement spécifique WHMCS ----
    # updates_tmp = dossier de travail des mises à jour WHMCS (Temporary Path).
    # Il est sous la racine mais ne doit jamais être servi par le web.
    location ~* ^/(vendor|resources|templates_c|crons|updates_tmp)/ { deny all; }
    location ~* (configuration\.php|\.env|composer\.(json|lock)) { deny all; }
    location ~ /\.(?!well-known) { deny all; }

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
