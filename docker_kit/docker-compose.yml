# =============================================================================
# docker-compose.yml — Boutique WHMCS Sys Kabs Amazone
# Stack : Nginx + PHP 8.2-FPM (ionCube) + MariaDB + cron
# Coexiste avec votre application Docker existante (voir README_DOCKER.md
# pour l'intégration au reverse proxy).
# =============================================================================
name: whmcs-boutique

services:
  php:
    build: .
    container_name: whmcs_php
    restart: unless-stopped
    volumes:
      - whmcs_app:/var/www/html
    environment:
      TZ: Africa/Dakar
    depends_on:
      db:
        condition: service_healthy
    networks: [whmcs_net]

  web:
    image: nginx:1.27-alpine
    container_name: whmcs_web
    restart: unless-stopped
    # Exposé UNIQUEMENT en local : c'est votre reverse proxy existant
    # (ou Traefik/NPM) qui publie le domaine en 80/443.
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - whmcs_app:/var/www/html:ro
      - ./nginx/whmcs.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [php]
    networks: [whmcs_net]

  db:
    image: mariadb:11.4
    container_name: whmcs_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: whmcs
      MARIADB_USER: whmcs_user
      MARIADB_PASSWORD: ${DB_PASSWORD:?Définissez DB_PASSWORD dans .env}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Définissez DB_ROOT_PASSWORD dans .env}
      TZ: Africa/Dakar
    volumes:
      - whmcs_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [whmcs_net]

  # Cron dédié : WHMCS toutes les 5 min + module The SSL Store chaque nuit
  cron:
    build: .
    container_name: whmcs_cron
    restart: unless-stopped
    volumes:
      - whmcs_app:/var/www/html
    environment:
      TZ: Africa/Dakar
    entrypoint: >
      sh -c 'echo "*/5 * * * * php -q /var/www/html/crons/cron.php" > /etc/crontab.whmcs &&
             echo "15 3 * * * php -q /var/www/html/modules/addons/thesslstorefullv2_admin/tss_cron.php" >> /etc/crontab.whmcs &&
             crontab /etc/crontab.whmcs && cron -f'
    depends_on: [php]
    networks: [whmcs_net]

volumes:
  whmcs_app:
  whmcs_db:

networks:
  whmcs_net:
    driver: bridge
