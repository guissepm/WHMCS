# =============================================================================
# docker-compose.yml — Boutique WHMCS Sys Kabs Amazone
# Stack : Nginx + PHP 8.2-FPM (ionCube) + MariaDB + cron
# Coexiste avec votre application Docker existante (voir README_DOCKER.md
# pour l'intégration au reverse proxy).
# =============================================================================
name: whmcs-boutique

services:
  php:
    build: .
    container_name: whmcs_php
    restart: unless-stopped
    volumes:
      - whmcs_app:/var/www/html
    environment:
      TZ: Africa/Dakar
    # DNS publics explicites : le résolveur Docker embarqué (127.0.0.11)
    # échoue à relayer vers l'extérieur sur certains hôtes (résolveur local
    # du VPS mal exposé aux conteneurs) — sans ça, la validation de licence
    # WHMCS et les appels API TheSSLStore échouent silencieusement (DNS KO,
    # connexion par IP nue OK).
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      db:
        condition: service_healthy
    networks: [whmcs_net]

  web:
    image: nginx:1.27-alpine
    container_name: whmcs_web
    restart: unless-stopped
    # Pas de port publié sur l'hôte : le reverse proxy existant (conteneur
    # "nginx" du projet /opt/deploy) atteint ce service par son nom de
    # conteneur via le réseau Docker partagé "deploy_app-network".
    volumes:
      - whmcs_app:/var/www/html:ro
      - ./nginx/whmcs.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [php]
    networks: [whmcs_net, deploy_app-network]

  db:
    image: mariadb:11.4
    container_name: whmcs_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: whmcs
      MARIADB_USER: whmcs_user
      MARIADB_PASSWORD: ${DB_PASSWORD:?Définissez DB_PASSWORD dans .env}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?Définissez DB_ROOT_PASSWORD dans .env}
      TZ: Africa/Dakar
    volumes:
      - whmcs_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [whmcs_net]

  # Cron dédié : WHMCS toutes les 5 min + module The SSL Store chaque nuit
  cron:
    build: .
    container_name: whmcs_cron
    restart: unless-stopped
    volumes:
      - whmcs_app:/var/www/html
    environment:
      TZ: Africa/Dakar
    dns:
      - 1.1.1.1
      - 8.8.8.8
    # IMPORTANT : cron a un PATH minimal (/usr/bin:/bin) qui n'inclut PAS
    # /usr/local/bin -> il faut le chemin COMPLET de php, sinon les tâches
    # échouent silencieusement ("cron never invoked" dans l'admin WHMCS).
    entrypoint: >
      sh -c 'echo "*/5 * * * * /usr/local/bin/php -q /var/www/html/crons/cron.php >> /var/log/whmcs-cron.log 2>&1" > /etc/crontab.whmcs &&
             echo "15 3 * * * /usr/local/bin/php -q /var/www/html/modules/addons/thesslstorefullv2_admin/tss_cron.php >> /var/log/whmcs-cron.log 2>&1" >> /etc/crontab.whmcs &&
             crontab /etc/crontab.whmcs && touch /var/log/whmcs-cron.log && cron && tail -f /var/log/whmcs-cron.log'
    depends_on: [php]
    networks: [whmcs_net]

volumes:
  whmcs_app:
  whmcs_db:

networks:
  whmcs_net:
    driver: bridge
  # Réseau du projet /opt/deploy (nginx + laravel + angular + mysql) déjà
  # en place sur le VPS — doit exister avant `docker compose up` :
  #   docker network ls   # -> deploy_app-network
  deploy_app-network:
    external: true
