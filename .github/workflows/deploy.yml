name: Deploy module to VPS

on:
  push:
    branches: [main]
    paths:
      - "modules/**"
      - "assets/**"
      - "templates/**"
      - "includes/**"
      - "pages/**"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurer la clé SSH de déploiement
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Synchroniser modules, assets, templates, hooks et pages vers le staging du VPS
        run: |
          # modules/assets/templates/includes -> sous-dossiers du webroot ;
          # pages -> fichiers PHP autonomes copiés à la RACINE du webroot.
          for dir in modules assets templates includes pages; do
            if [ -d "$dir" ]; then
              rsync -rlptzv --checksum \
                -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
                "$dir/" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/whmcs-boutique/overlay/$dir/"
            fi
          done

      - name: Copier l'overlay dans le conteneur WHMCS et corriger les permissions
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
            for dir in modules assets templates includes; do
              if [ -d "/opt/whmcs-boutique/overlay/$dir" ]; then
                docker cp "/opt/whmcs-boutique/overlay/$dir/." "whmcs_php:/var/www/html/$dir/" || exit 1
              fi
            done
            # Pages autonomes : contenu de pages/ copié à la racine du webroot.
            if [ -d "/opt/whmcs-boutique/overlay/pages" ]; then
              docker cp "/opt/whmcs-boutique/overlay/pages/." "whmcs_php:/var/www/html/" || exit 1
            fi
            docker exec whmcs_php chown -R www-data:www-data /var/www/html/modules /var/www/html/assets /var/www/html/templates /var/www/html/includes
            docker exec whmcs_php sh -c "chown www-data:www-data /var/www/html/mentions-legales.php 2>/dev/null || true"'
