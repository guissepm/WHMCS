name: Deploy module to VPS

on:
  push:
    branches: [main]
    paths:
      - "modules/**"
      - "assets/**"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurer la clé SSH de déploiement
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Synchroniser modules/ et assets/ vers le staging du VPS
        run: |
          rsync -rlptzv --checksum --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            modules/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/whmcs-boutique/overlay/modules/"
          rsync -rlptzv --checksum --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            assets/ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/whmcs-boutique/overlay/assets/"

      - name: Copier l'overlay dans le conteneur WHMCS et corriger les permissions
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
            docker cp /opt/whmcs-boutique/overlay/modules/. whmcs_php:/var/www/html/modules/ &&
            docker cp /opt/whmcs-boutique/overlay/assets/.  whmcs_php:/var/www/html/assets/ &&
            docker exec whmcs_php chown -R www-data:www-data /var/www/html/modules /var/www/html/assets'
